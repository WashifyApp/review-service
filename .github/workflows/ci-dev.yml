name: CI — Dev

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  # ── Stage 1: SonarQube Code Quality
  sonarqube:
    name: Stage 1 — SonarQube
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-sonarqube.yml@main
    with:
      environment: dev
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 2: Snyk Dependency Scan 
  snyk:
    name: Stage 2 — Snyk
    needs: sonarqube
    if: always()   # run even if SonarQube failed
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-snyk.yml@main
    with:
      environment: dev
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 3: Docker Build + Trivy + Push to GHCR
  build-scan-push:
    name: Stage 3 — Build, Scan & Push
    needs: snyk
    if: always()   # run even if Snyk failed
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-build-scan-push.yml@main
    with:
      environment: dev
      image_tag: sha-${{ github.sha }}
    secrets:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}
